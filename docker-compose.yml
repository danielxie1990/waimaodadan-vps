version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SQLite — zero setup, data persists in the volume below
      DATABASE_URL: "file:./data/dev.db"
      JWT_SECRET: "${JWT_SECRET:-change-this-to-a-random-string-in-production}"
      NODE_ENV: production
    volumes:
      # Persist SQLite database across restarts
      - sqldata:/app/prisma/data
    # Auto-migrate database on startup, then start the app
    entrypoint: >
      sh -c "
        echo '→ Running database migrations...' &&
        npx prisma migrate deploy 2>&1 | tail -3 &&
        echo '→ Starting application...' &&
        node server.js
      "

volumes:
  sqldata:
